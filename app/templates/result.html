<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% if correct %}Flawless Victory!{% else %}Training Result{% endif %} -
      ChessMind Pro
    </title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='premium-chess-styles.css') }}"
    />
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-LP35D8LBWQ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-LP35D8LBWQ");
    </script>
  </head>
  <body>
    <div class="game-container">
      <div class="game-content">
        <h1 class="game-title">
          {% if correct %}Flawless Victory!{% else %}Training Result{% endif %}
        </h1>

        <div
          class="alert {% if correct %}alert-success{% else %}alert-danger{% endif %}"
        >
          {{ message }}
        </div>

        <div
          id="chessboard-container"
          data-piece="{{ piece }}"
          data-start="{{ start_square }}"
          data-end="{{ end_square }}"
          data-path="{{ path|join(',') if path else '' }}"
          style="margin-bottom: 1rem"
        ></div>

        <div class="navigation-section">
          <a href="{{ url_for(game_type) }}" class="nav-link primary"
            >Continue Training</a
          >
          <a href="{{ url_for('index') }}" class="nav-link">Back to Menu</a>
        </div>
      </div>
    </div>

    <script src="{{ url_for('static', filename='js/chessboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/keyboard-input.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auto-advance.js') }}"></script>
  </body>
</html>
